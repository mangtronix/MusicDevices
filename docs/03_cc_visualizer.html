<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 — CC Visualizer</title>

  <script src="https://cdn.jsdelivr.net/npm/webmidi@3/dist/iife/webmidi.iife.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d14; overflow: hidden; font-family: 'Courier New', monospace; }

    /* ── Top status bar ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 16px;
      background: rgba(13,13,20,0.9);
      font-size: 12px; color: #555;
      z-index: 10; pointer-events: none;
    }
    #hud .title       { color: #a0c4ff; }
    #hud #device-name { color: #56b4f7; }
    #hud #device-name.none { color: #333; }

    /* ── Active CC info line ── */
    #cc-info {
      position: fixed; top: 38px; left: 0; right: 0;
      padding: 8px 20px;
      background: rgba(13,13,20,0.75);
      font-size: 16px; color: #aaa;
      z-index: 10; pointer-events: none;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    #cc-info .field   { color: #555; font-size: 0.72em; text-transform: uppercase; }
    #cc-info .val     { color: #56b4f7; font-weight: bold; }
    #cc-info .name    { color: #e0e0f0; }
    #cc-info .sep     { color: #2a2a40; }
    #cc-info .val-big { color: #56b4f7; font-weight: bold; font-size: 1.2em; }
    #cc-info .hint    { color: #333; font-size: 13px; }

    /* ── CC chip grid at the bottom ── */
    #cc-list {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #0a0a12;       /* gap colour */
      border-top: 1px solid #1a1a28;
      z-index: 10;
    }

    .cc-chip {
      background: #0d0d18;
      padding: 9px 12px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .cc-chip.active {
      background: #0e1422;
      border-top: 2px solid #56b4f7;
      padding-top: 7px;   /* compensate for extra border */
    }

    .chip-top {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .chip-value {
      font-size: 22px; font-weight: bold;
      color: #56b4f7; min-width: 38px;
    }
    .cc-chip.active .chip-value { color: #82d4ff; }

    .chip-name {
      font-size: 10px; color: #666;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 62%; text-align: right;
    }
    .cc-chip.active .chip-name { color: #999; }

    .chip-bar-track {
      height: 3px; background: #1a1a28; border-radius: 2px; overflow: hidden;
    }
    .chip-bar-fill {
      height: 100%; width: 0%; background: #2a5070;
      transition: width 0.06s linear;
    }
    .cc-chip.active .chip-bar-fill { background: #56b4f7; }

    .chip-meta { font-size: 10px; color: #333; }
    .cc-chip.active .chip-meta { color: #445; }

    #back {
      position: fixed; top: 8px; right: 16px;
      font-size: 11px; color: #333; text-decoration: none; z-index: 20;
    }
    #back:hover { color: #888; }
  </style>
</head>
<body>

<div id="hud">
  <span class="title">03 — CC Visualizer</span>
  <span>MIDI:</span>
  <span id="device-name" class="none">no device</span>
</div>

<div id="cc-info">
  <span class="hint">move a slider or knob on your controller…</span>
</div>

<div id="cc-list"></div>

<a href="index.html" id="back">← back</a>

<script>
// ─── Common CC names ──────────────────────────────────────────────────────────
const CC_NAMES = {
  0:'Bank Select',  1:'Modulation',   2:'Breath',        4:'Foot Ctrl',
  5:'Portamento Time', 7:'Volume',    8:'Balance',       10:'Pan',
  11:'Expression',  12:'Effect 1',   13:'Effect 2',     32:'Bank (LSB)',
  64:'Sustain',     65:'Portamento', 66:'Sostenuto',    67:'Soft Pedal',
  68:'Legato',      71:'Resonance',  72:'Release',      73:'Attack',
  74:'Filter Cutoff', 75:'Decay',    76:'Vib Rate',     77:'Vib Depth',
  78:'Vib Delay',   91:'Reverb',     92:'Tremolo',      93:'Chorus',
  94:'Detune',      95:'Phaser',    120:'All Sound Off',121:'Reset Ctrls',
  123:'All Notes Off',
};

function ccName(cc) { return CC_NAMES[cc] || ''; }

// ─── State ────────────────────────────────────────────────────────────────────
const HISTORY_LEN = 300;

const state = {
  activeKey: null,
  ccData: {},        // "ch:cc" → { channel, cc, value, history[] }
};

function keyFor(ch, cc) { return `${ch}:${cc}`; }

function getOrCreate(channel, cc, value) {
  const key = keyFor(channel, cc);
  if (!state.ccData[key]) {
    state.ccData[key] = {
      channel, cc, value,
      history: new Array(HISTORY_LEN).fill(value),
    };
  }
  return state.ccData[key];
}

// ─── HTML update helpers ──────────────────────────────────────────────────────
function updateInfoLine() {
  const el = document.getElementById('cc-info');
  if (!state.activeKey) {
    el.innerHTML = '<span class="hint">move a slider or knob on your controller…</span>';
    return;
  }
  const d = state.ccData[state.activeKey];
  const name = CC_NAMES[d.cc] || '(generic CC)';
  el.innerHTML =
    `<span class="field">ch</span> <span class="val">${d.channel}</span>` +
    `<span class="sep"> · </span>` +
    `<span class="field">cc</span> <span class="val">${d.cc}</span>` +
    `<span class="sep"> · </span>` +
    `<span class="name">${name}</span>` +
    `<span class="sep"> · </span>` +
    `<span class="field">value</span> <span class="val-big">${d.value}</span>` +
    `<span class="sep">/ 127</span>`;
}

function updateChips() {
  const container = document.getElementById('cc-list');

  for (const [key, d] of Object.entries(state.ccData)) {
    let chip = document.getElementById('chip-' + key);

    // Create chip on first appearance
    if (!chip) {
      chip = document.createElement('div');
      chip.id = 'chip-' + key;
      chip.innerHTML =
        `<div class="chip-top">` +
          `<span class="chip-value" id="val-${key}">0</span>` +
          `<span class="chip-name">${ccName(d.cc) || 'CC ' + d.cc}</span>` +
        `</div>` +
        `<div class="chip-bar-track"><div class="chip-bar-fill" id="bar-${key}"></div></div>` +
        `<div class="chip-meta">ch ${d.channel} · cc ${d.cc}</div>`;
      container.appendChild(chip);
    }

    // Update active styling
    chip.className = 'cc-chip' + (key === state.activeKey ? ' active' : '');

    // Update value and bar (in-place, no DOM rebuild)
    document.getElementById('val-' + key).textContent = d.value;
    document.getElementById('bar-' + key).style.width = (d.value / 127 * 100).toFixed(1) + '%';
  }
}

// Estimate chip grid height so the canvas avoids it
function chipGridHeight() {
  const rows = Math.max(1, Math.ceil(Object.keys(state.ccData).length / 4));
  return rows * 74 + 1;   // ~74px per row + border
}

// ─── WebMIDI setup ────────────────────────────────────────────────────────────
WebMidi.enable()
  .then(() => {
    function attachInput(input) {
      document.getElementById('device-name').textContent = input.name;
      document.getElementById('device-name').classList.remove('none');

      input.addListener('controlchange', e => {
        const channel = e.message.channel;
        const cc      = e.controller.number;
        const value   = e.rawValue;

        const d = getOrCreate(channel, cc, value);
        d.value = value;
        d.history.push(value);
        if (d.history.length > HISTORY_LEN) d.history.shift();

        state.activeKey = keyFor(channel, cc);
        updateInfoLine();
        updateChips();
      });
    }

    WebMidi.inputs.forEach(attachInput);

    WebMidi.addListener('connected', e => {
      if (e.port.type === 'input') attachInput(e.port);
    });
    WebMidi.addListener('disconnected', e => {
      const el = document.getElementById('device-name');
      if (el.textContent === e.port.name) {
        el.textContent = 'no device';
        el.classList.add('none');
      }
    });
  })
  .catch(err => {
    document.getElementById('device-name').textContent = 'MIDI denied';
    console.error(err);
  });

// ─── p5.js sketch ─────────────────────────────────────────────────────────────
new p5(function(p) {

  const ACCENT = [86, 180, 247];

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.RGB, 255, 255, 255, 255);
    p.textFont('Courier New');
  };

  p.draw = function() {
    p.background(13, 13, 20);

    if (!state.activeKey) {
      p.noStroke();
      p.fill(60, 60, 90);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(14);
      p.text('move a slider or knob on your controller…', p.width / 2, p.height / 2);
      return;
    }

    const d = state.ccData[state.activeKey];

    // Layout: reserve space for the top HUD (85px) and bottom chip grid
    const topPad  = 85;
    const botPad  = chipGridHeight() + 10;
    const availH  = p.height - topPad - botPad;

    // Dial — centered horizontally, upper portion of available area
    const dialR = Math.min(p.width * 0.15, availH * 0.38);
    const cx    = p.width / 2;
    const cy    = topPad + dialR + 10;

    // Waveform — full width, between dial and chip grid
    const waveTop    = cy + dialR + 30;
    const waveBottom = p.height - botPad - 10;
    const waveLeft   = p.width * 0.06;
    const waveRight  = p.width * 0.94;

    drawDial(cx, cy, dialR, d);
    if (waveBottom > waveTop + 40) {   // only draw if there's room
      drawWaveform(d, waveLeft, waveRight, waveTop, waveBottom);
    }
  };

  // ── Dial ──────────────────────────────────────────────────────────────────
  function drawDial(cx, cy, r, d) {
    const norm       = d.value / 127;
    const startAngle = p.radians(150);
    const sweepAngle = p.radians(240);
    const endAngle   = startAngle + sweepAngle * norm;

    // Background track
    p.noFill();
    p.stroke(28, 28, 42);
    p.strokeWeight(8);
    p.arc(cx, cy, r * 2, r * 2, startAngle, startAngle + sweepAngle);

    // Value arc
    if (norm > 0) {
      p.stroke(ACCENT[0], ACCENT[1], ACCENT[2]);
      p.strokeWeight(8);
      p.arc(cx, cy, r * 2, r * 2, startAngle, endAngle);
    }

    // Needle tip dot
    p.fill(ACCENT[0], ACCENT[1], ACCENT[2]);
    p.noStroke();
    p.circle(
      cx + Math.cos(endAngle) * r,
      cy + Math.sin(endAngle) * r,
      12
    );

    // Center value (big)
    p.fill(ACCENT[0], ACCENT[1], ACCENT[2]);
    p.textAlign(p.CENTER, p.CENTER);
    p.textStyle(p.BOLD);
    p.textSize(r * 0.55);
    p.text(d.value, cx, cy - r * 0.04);

    // "/ 127"
    p.fill(55, 55, 75);
    p.textStyle(p.NORMAL);
    p.textSize(r * 0.14);
    p.text('/ 127', cx, cy + r * 0.34);

    // Tick marks
    drawTick(cx, cy, r, startAngle,                   '0');
    drawTick(cx, cy, r, startAngle + sweepAngle * 0.5, '64');
    drawTick(cx, cy, r, startAngle + sweepAngle,       '127');
  }

  function drawTick(cx, cy, r, angle, label) {
    p.stroke(38, 38, 55);
    p.strokeWeight(1.5);
    p.line(
      cx + Math.cos(angle) * r * 1.12, cy + Math.sin(angle) * r * 1.12,
      cx + Math.cos(angle) * r * 1.22, cy + Math.sin(angle) * r * 1.22,
    );
    p.noStroke();
    p.fill(48, 48, 68);
    p.textStyle(p.NORMAL);
    p.textSize(11);
    p.textAlign(p.CENTER, p.CENTER);
    p.text(label, cx + Math.cos(angle) * r * 1.38, cy + Math.sin(angle) * r * 1.38);
  }

  // ── Waveform ──────────────────────────────────────────────────────────────
  function drawWaveform(d, left, right, top, bottom) {
    const midY = (top + bottom) / 2;
    const h    = bottom - top;
    const w    = right - left;

    // Axes
    p.stroke(25, 25, 40);
    p.strokeWeight(1);
    p.line(left, top,    right, top);
    p.line(left, bottom, right, bottom);
    p.line(left, midY,   right, midY);
    p.line(left, top,    left,  bottom);

    // Axis labels
    p.noStroke();
    p.fill(38, 38, 58);
    p.textStyle(p.NORMAL);
    p.textSize(10);
    p.textAlign(p.RIGHT, p.CENTER);
    p.text('127', left - 5, top);
    p.text(' 64', left - 5, midY);
    p.text('  0', left - 5, bottom);

    const hist = d.history;

    // Filled area
    p.noStroke();
    p.fill(ACCENT[0], ACCENT[1], ACCENT[2], 25);
    p.beginShape();
    p.vertex(left, bottom);
    for (let i = 0; i < hist.length; i++) {
      p.vertex(left + (i / (hist.length - 1)) * w, bottom - (hist[i] / 127) * h);
    }
    p.vertex(right, bottom);
    p.endShape(p.CLOSE);

    // Line
    p.noFill();
    p.stroke(ACCENT[0], ACCENT[1], ACCENT[2], 210);
    p.strokeWeight(2);
    p.beginShape();
    for (let i = 0; i < hist.length; i++) {
      p.vertex(left + (i / (hist.length - 1)) * w, bottom - (hist[i] / 127) * h);
    }
    p.endShape();

    // Current value dot + label on right edge
    const curY = bottom - (d.value / 127) * h;
    p.fill(ACCENT[0], ACCENT[1], ACCENT[2]);
    p.noStroke();
    p.circle(right, curY, 8);
    p.textAlign(p.LEFT, p.CENTER);
    p.textSize(12);
    p.text(d.value, right + 8, curY);
  }

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
