<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01 — MIDI Monitor</title>

  <!-- WebMIDI.js v3: provides the WebMidi global object -->
  <script src="https://cdn.jsdelivr.net/npm/webmidi@3/dist/iife/webmidi.iife.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d14;
      color: #e0e0f0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 260px 1fr;
      grid-template-areas:
        "header header"
        "sidebar log";
    }

    header {
      grid-area: header;
      padding: 16px 20px;
      background: #13131f;
      border-bottom: 1px solid #1e1e30;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    h1 { font-size: 0.95rem; color: #a0c4ff; }

    #status {
      font-size: 0.8rem;
      color: #555;
    }

    #status.ok   { color: #6fcf97; }
    #status.err  { color: #eb5757; }

    /* ── Sidebar: device list ── */
    #sidebar {
      grid-area: sidebar;
      padding: 16px;
      border-right: 1px solid #1e1e30;
      overflow-y: auto;
    }

    .section-label {
      font-size: 0.7rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .device {
      padding: 6px 8px;
      margin-bottom: 4px;
      background: #13131f;
      border: 1px solid #1e1e30;
      color: #888;
      font-size: 0.78rem;
    }

    .device.active {
      border-color: #6fcf97;
      color: #6fcf97;
    }

    .device.output { color: #9b8fff; }

    .no-devices { color: #333; font-size: 0.78rem; }

    /* ── Log panel ── */
    #log-panel {
      grid-area: log;
      display: flex;
      flex-direction: column;
    }

    #log-controls {
      padding: 10px 16px;
      border-bottom: 1px solid #1e1e30;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: #1a1a2a;
      border: 1px solid #2a2a40;
      color: #888;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
    }
    button:hover { background: #22223a; color: #ccc; }

    #filter {
      background: #13131f;
      border: 1px solid #2a2a40;
      color: #ccc;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 0.78rem;
    }

    label { color: #555; font-size: 0.78rem; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .entry {
      display: grid;
      grid-template-columns: 70px 90px 1fr;
      gap: 0 12px;
      padding: 3px 16px;
      border-bottom: 1px solid #0f0f1a;
      line-height: 1.5;
    }
    .entry:hover { background: #13131f; }

    .time   { color: #444; }
    .type   { font-weight: bold; }
    .detail { color: #aaa; }

    /* color coding by message type */
    .type-noteon     { color: #6fcf97; }
    .type-noteoff    { color: #4a8f6a; }
    .type-cc         { color: #56b4f7; }
    .type-pitchbend  { color: #e8a838; }
    .type-other      { color: #777; }

    #log-count {
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>

<header>
  <h1>01 — MIDI Monitor</h1>
  <span id="status">Waiting for MIDI access…</span>
  <a href="index.html" style="margin-left:auto; color:#333; font-size:0.75rem; text-decoration:none;">← back</a>
</header>

<div id="sidebar">
  <div class="section-label">Inputs</div>
  <div id="inputs-list"><span class="no-devices">none</span></div>

  <div class="section-label" style="margin-top:16px;">Outputs</div>
  <div id="outputs-list"><span class="no-devices">none</span></div>
</div>

<div id="log-panel">
  <div id="log-controls">
    <button id="btn-clear">Clear</button>
    <label>
      Filter:
      <select id="filter">
        <option value="all">All messages</option>
        <option value="noteon">Note On</option>
        <option value="noteoff">Note Off</option>
        <option value="controlchange">CC</option>
      </select>
    </label>
    <span id="log-count">0 messages</span>
  </div>
  <div id="log"></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let messageCount = 0;
const MAX_ENTRIES = 200;   // keep the DOM lean
let filterType = 'all';

// ─── Helpers ─────────────────────────────────────────────────────────────────
function timestamp() {
  const d = new Date();
  return d.toLocaleTimeString('en-US', { hour12: false }) +
         '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function noteLabel(number) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return names[number % 12] + Math.floor(number / 12 - 1);
}

// ─── Log a MIDI message ───────────────────────────────────────────────────────
function logMessage(type, detail) {
  if (filterType !== 'all' && type !== filterType) return;

  const log = document.getElementById('log');

  const entry = document.createElement('div');
  entry.className = 'entry';

  const typeClass = {
    noteon: 'type-noteon',
    noteoff: 'type-noteoff',
    controlchange: 'type-cc',
    pitchbend: 'type-pitchbend',
  }[type] || 'type-other';

  entry.innerHTML =
    `<span class="time">${timestamp()}</span>` +
    `<span class="type ${typeClass}">${type}</span>` +
    `<span class="detail">${detail}</span>`;

  log.prepend(entry);   // newest at top

  // Trim old entries
  while (log.children.length > MAX_ENTRIES) {
    log.removeChild(log.lastChild);
  }

  messageCount++;
  document.getElementById('log-count').textContent = messageCount + ' messages';
}

// ─── Attach listeners to a MIDI input ────────────────────────────────────────
function attachListeners(input) {
  // Note On — a key / button was pressed
  input.addListener('noteon', e => {
    const note   = e.note.number;
    const name   = noteLabel(note);
    const vel    = e.rawVelocity;
    const ch     = e.message.channel;
    logMessage('noteon', `note ${note} (${name})  vel ${vel}  ch ${ch}  [${input.name}]`);
  });

  // Note Off — a key / button was released
  input.addListener('noteoff', e => {
    const note = e.note.number;
    const name = noteLabel(note);
    const ch   = e.message.channel;
    logMessage('noteoff', `note ${note} (${name})  ch ${ch}  [${input.name}]`);
  });

  // Control Change — sliders, knobs, pedals, etc.
  input.addListener('controlchange', e => {
    const cc  = e.controller.number;
    const val = e.rawValue;          // 0–127
    const ch  = e.message.channel;
    logMessage('controlchange', `CC ${cc}  value ${val}  ch ${ch}  [${input.name}]`);
  });

  // Pitch Bend
  input.addListener('pitchbend', e => {
    logMessage('pitchbend', `value ${e.value.toFixed(3)}  ch ${e.message.channel}  [${input.name}]`);
  });

  // Catch everything else as a raw byte dump
  input.addListener('midimessage', e => {
    const type = e.message.type;
    if (['noteon','noteoff','controlchange','pitchbend'].includes(type)) return;
    const bytes = Array.from(e.message.data)
      .map(b => b.toString(16).padStart(2,'0'))
      .join(' ');
    logMessage('other', `${type}  [${bytes}]  [${input.name}]`);
  });
}

// ─── Update the device list sidebar ──────────────────────────────────────────
function refreshDeviceList() {
  const inEl  = document.getElementById('inputs-list');
  const outEl = document.getElementById('outputs-list');

  inEl.innerHTML  = WebMidi.inputs.length  ? '' : '<span class="no-devices">none</span>';
  outEl.innerHTML = WebMidi.outputs.length ? '' : '<span class="no-devices">none</span>';

  WebMidi.inputs.forEach(input => {
    const d = document.createElement('div');
    d.className = 'device active';
    d.textContent = input.name;
    inEl.appendChild(d);
  });

  WebMidi.outputs.forEach(output => {
    const d = document.createElement('div');
    d.className = 'device output';
    d.textContent = output.name;
    outEl.appendChild(d);
  });
}

// ─── Main ─────────────────────────────────────────────────────────────────────
WebMidi.enable()
  .then(() => {
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Web MIDI ready';
    statusEl.className = 'ok';

    // Attach listeners to every input already connected
    WebMidi.inputs.forEach(attachListeners);
    refreshDeviceList();

    // Handle devices being plugged in / out while the page is open
    WebMidi.addListener('connected', e => {
      if (e.port.type === 'input') attachListeners(e.port);
      refreshDeviceList();
      logMessage('other', `Device connected: ${e.port.name}`);
    });

    WebMidi.addListener('disconnected', e => {
      refreshDeviceList();
      logMessage('other', `Device disconnected: ${e.port.name}`);
    });
  })
  .catch(err => {
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'MIDI access denied: ' + err.message;
    statusEl.className = 'err';
    console.error(err);
  });

// ─── UI controls ─────────────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('log').innerHTML = '';
  messageCount = 0;
  document.getElementById('log-count').textContent = '0 messages';
});

document.getElementById('filter').addEventListener('change', e => {
  filterType = e.target.value;
});
</script>
</body>
</html>
