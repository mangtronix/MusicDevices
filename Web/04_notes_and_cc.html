<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 — Integrated p5 / CircuitPython</title>

  <script src="https://cdn.jsdelivr.net/npm/webmidi@3/dist/iife/webmidi.iife.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080810; overflow: hidden; font-family: 'Courier New', monospace; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 16px;
      background: rgba(8,8,16,0.85);
      font-size: 12px; color: #555;
      z-index: 10; pointer-events: none;
    }
    #hud .title        { color: #a0c4ff; }
    #hud #device-name  { color: #6fcf97; }
    #hud #device-name.none { color: #333; }

    #back {
      position: fixed; top: 8px; right: 16px;
      font-size: 11px; color: #333; text-decoration: none; z-index: 20;
    }
    #back:hover { color: #888; }
  </style>
</head>
<body>

<div id="hud">
  <span class="title">04 — Integrated p5 / CircuitPython</span>
  <span>MIDI:</span>
  <span id="device-name" class="none">no device</span>
</div>
<a href="index.html" id="back">← back</a>

<script>
// ─── Shared MIDI state ────────────────────────────────────────────────────────
// Written by WebMIDI listeners, read by the p5 draw loop.
const midi = {
  activeNotes: new Set(),    // notes currently held down
  seenNotes:   {},           // { note: { color:[r,g,b] } } — registered on first NoteOn
  particles:   [],           // active particle objects
  ccData:      {},           // { "ch:cc": { channel, cc, value } }
  activeCcKey: null,         // most recently received CC
};

// ─── Note helpers (same pattern as example 02) ───────────────────────────────
function registerNote(note) {
  if (midi.seenNotes[note]) return;
  const hue = ((note % 12) * 30 + 200) % 360;
  midi.seenNotes[note] = { color: hsvToRgb(hue, 0.8, 1.0) };
}

function sortedSeenNotes() {
  return Object.keys(midi.seenNotes).map(Number).sort((a, b) => a - b);
}

function noteXFrac(note) {
  const sorted = sortedSeenNotes();
  const i = sorted.indexOf(note);
  return (i + 1) / (sorted.length + 1);
}

function noteName(n) {
  return ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][n % 12] +
         (Math.floor(n / 12) - 1);
}

function hsvToRgb(h, s, v) {
  const c = v * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
  let r, g, b;
  if      (h <  60) [r,g,b] = [c,x,0];
  else if (h < 120) [r,g,b] = [x,c,0];
  else if (h < 180) [r,g,b] = [0,c,x];
  else if (h < 240) [r,g,b] = [0,x,c];
  else if (h < 300) [r,g,b] = [x,0,c];
  else              [r,g,b] = [c,0,x];
  return [(r+m)*255, (g+m)*255, (b+m)*255];
}

// ─── CC helpers ───────────────────────────────────────────────────────────────
const CC_NAMES = {
  0:'Bank Select', 1:'Modulation', 2:'Breath', 4:'Foot Ctrl',
  7:'Volume', 10:'Pan', 11:'Expression', 64:'Sustain',
  71:'Resonance', 72:'Release', 73:'Attack', 74:'Filter Cutoff',
  91:'Reverb', 93:'Chorus',
};

function ccLabel(cc) { return CC_NAMES[cc] || `CC ${cc}`; }

// ─── Gravity: the active CC maps 0→float up, 64→weightless, 127→fall down ────
// This is the main thing the CC controls in this example.
function gravityAccel() {
  if (!midi.activeCcKey) return 0.06;    // default: gentle downward pull
  const val = midi.ccData[midi.activeCcKey].value;
  return (val / 127) * 0.65 - 0.30;     // -0.30 (float) … 0.35 (fall)
}

// ─── Particle spawning (called from WebMIDI callbacks, outside p5) ────────────
function spawnBurst(note, vel) {
  const cfg = midi.seenNotes[note];
  if (!cfg) return;

  const x     = noteXFrac(note) * window.innerWidth;
  const y     = window.innerHeight * 0.65;
  const count = Math.round(10 + (vel / 127) * 25);

  for (let i = 0; i < count; i++) spawnParticle(x, y, note, cfg.color, vel);
}

function spawnTrickle(note) {
  const cfg = midi.seenNotes[note];
  if (!cfg) return;
  const x = noteXFrac(note) * window.innerWidth;
  const y = window.innerHeight * 0.65;
  for (let i = 0; i < 2; i++) spawnParticle(x, y, note, cfg.color, 60);
}

function spawnParticle(x, y, note, color, vel) {
  const speed = 1.5 + Math.random() * (3 + vel / 127 * 5);
  const angle = -Math.PI * (0.15 + Math.random() * 0.70);
  const jitter = 20;
  midi.particles.push({
    x: x + (Math.random() - 0.5) * jitter,
    y: y + (Math.random() - 0.5) * jitter,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: clamp(color[0] + (Math.random() - 0.5) * 50),
    g: clamp(color[1] + (Math.random() - 0.5) * 50),
    b: clamp(color[2] + (Math.random() - 0.5) * 50),
    size: 2.5 + Math.random() * 3.5,
    life: 1.0,
    note,          // which note owns this particle (used for interactions)
  });
}

function clamp(v) { return Math.max(0, Math.min(255, v)); }

// ─── Particle interactions ────────────────────────────────────────────────────
// Particles from DIFFERENT notes repel at close range and weakly attract at
// medium range. Same-note particles ignore each other. The attraction band
// makes clouds orbit around each other rather than just flying apart.
//
// A spatial hash grid limits comparisons to nearby particles → O(N) per frame.

const CELL = 80;   // grid cell size in pixels

function buildGrid(particles) {
  const grid = new Map();
  for (const pt of particles) {
    const key = `${Math.floor(pt.x / CELL)},${Math.floor(pt.y / CELL)}`;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(pt);
  }
  return grid;
}

function applyInteractions(particles, grid) {
  const MAX_SPEED = 12;

  for (const pt of particles) {
    const cx = Math.floor(pt.x / CELL);
    const cy = Math.floor(pt.y / CELL);

    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const cell = grid.get(`${cx + dx},${cy + dy}`);
        if (!cell) continue;
        for (const other of cell) {
          if (other === pt || other.note === pt.note) continue;

          const nx   = pt.x - other.x;
          const ny   = pt.y - other.y;
          const dist = Math.sqrt(nx * nx + ny * ny);
          if (dist < 1) continue;

          if (dist < 40) {
            // Close range: strong repulsion — clouds bounce off each other
            const f = 2.5 / dist;
            pt.vx += (nx / dist) * f;
            pt.vy += (ny / dist) * f;
          } else if (dist < 120) {
            // Medium range: weak attraction — clouds swirl and orbit
            const t = (dist - 40) / 80;   // 0 at 40 px, 1 at 120 px
            const f = 0.09 * (1 - t);
            pt.vx -= (nx / dist) * f;
            pt.vy -= (ny / dist) * f;
          }
        }
      }
    }

    // Cap speed so forces don't blow up
    const spd = Math.sqrt(pt.vx * pt.vx + pt.vy * pt.vy);
    if (spd > MAX_SPEED) { pt.vx = pt.vx / spd * MAX_SPEED; pt.vy = pt.vy / spd * MAX_SPEED; }
  }
}

// ─── Web Audio: chromatically tuned explosion sounds ─────────────────────────
// Each NoteOn fires a three-layer sound:
//   1. Pitched sine at the MIDI note's frequency (main body)
//   2. Sub-octave sine at freq/2 (low-end weight)
//   3. Band-pass filtered noise burst (transient "crack")
// All layers use a sharp attack and exponential decay so they feel percussive.

let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Browsers require a user gesture to start AudioContext.
// Clicking anywhere on the page satisfies that requirement.
document.addEventListener('click', () => getAudio(), { once: true });

function midiToHz(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

function playExplosion(note, vel) {
  const ctx  = getAudio();
  const now  = ctx.currentTime;
  const freq = midiToHz(note);
  const amp  = 0.55 * (vel / 127);

  // Master gain for this event
  const master = ctx.createGain();
  master.gain.setValueAtTime(amp, now);
  master.connect(ctx.destination);

  // Layer 1: pitched sine — starts a minor third sharp, drops to pitch in 25 ms
  // This pitch-drop attack gives the "thud" character of a tuned kick drum.
  const osc1 = ctx.createOscillator();
  const env1 = ctx.createGain();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(freq * 1.2, now);
  osc1.frequency.exponentialRampToValueAtTime(freq, now + 0.025);
  env1.gain.setValueAtTime(1.0, now);
  env1.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
  osc1.connect(env1); env1.connect(master);
  osc1.start(now); osc1.stop(now + 0.75);

  // Layer 2: sub-octave sine for low-end weight
  const osc2 = ctx.createOscillator();
  const env2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq / 2, now);
  env2.gain.setValueAtTime(0.7, now);
  env2.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
  osc2.connect(env2); env2.connect(master);
  osc2.start(now); osc2.stop(now + 0.6);

  // Layer 3: short burst of white noise band-passed at the note frequency
  const bufLen  = Math.ceil(ctx.sampleRate * 0.12);
  const noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data     = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  const noise  = ctx.createBufferSource();
  noise.buffer = noiseBuf;

  const bpf = ctx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = freq * 2;   // colour the noise around the 2nd harmonic
  bpf.Q.value = 1.2;

  const env3 = ctx.createGain();
  env3.gain.setValueAtTime(0.8, now);
  env3.gain.exponentialRampToValueAtTime(0.001, now + 0.10);

  noise.connect(bpf); bpf.connect(env3); env3.connect(master);
  noise.start(now); noise.stop(now + 0.12);
}

// ─── WebMIDI setup ────────────────────────────────────────────────────────────
WebMidi.enable()
  .then(() => {
    function attachInput(input) {
      document.getElementById('device-name').textContent = input.name;
      document.getElementById('device-name').classList.remove('none');

      // NoteOn: register note, spawn particles and play tuned explosion
      input.addListener('noteon', e => {
        const note = e.note.number;
        const vel  = e.rawVelocity;
        registerNote(note);
        midi.activeNotes.add(note);
        spawnBurst(note, vel);
        playExplosion(note, vel);
      });

      // NoteOff: stop the trickle
      input.addListener('noteoff', e => {
        midi.activeNotes.delete(e.note.number);
      });

      // Control Change: update the CC that controls gravity
      input.addListener('controlchange', e => {
        const key = `${e.message.channel}:${e.controller.number}`;
        midi.ccData[key] = {
          channel: e.message.channel,
          cc:      e.controller.number,
          value:   e.rawValue,
        };
        midi.activeCcKey = key;
      });
    }

    WebMidi.inputs.forEach(attachInput);

    WebMidi.addListener('connected', e => {
      if (e.port.type === 'input') attachInput(e.port);
    });
    WebMidi.addListener('disconnected', e => {
      const el = document.getElementById('device-name');
      if (el.textContent === e.port.name) {
        el.textContent = 'no device';
        el.classList.add('none');
      }
    });
  })
  .catch(err => {
    document.getElementById('device-name').textContent = 'MIDI denied';
    console.error(err);
  });

// ─── p5.js sketch ─────────────────────────────────────────────────────────────
new p5(function(p) {

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.RGB, 255, 255, 255, 255);
    p.textFont('Courier New');
  };

  p.draw = function() {
    // Low-alpha fill creates motion trails instead of a hard clear
    p.noStroke();
    p.fill(8, 8, 16, 35);
    p.rect(0, 0, p.width, p.height);

    const g = gravityAccel();

    // Trickle particles for held notes
    for (const note of midi.activeNotes) {
      spawnTrickle(note);
    }

    // Build spatial grid once per frame (used for both physics and sparks)
    const grid = buildGrid(midi.particles);

    // Cross-note physics: repulsion + orbital attraction
    applyInteractions(midi.particles, grid);

    // Update positions and draw particles
    for (const pt of midi.particles) {
      pt.vy += g;
      pt.x  += pt.vx;
      pt.y  += pt.vy;
      pt.vx *= 0.995;
      pt.life -= 0.007;

      const a = pt.life * 255;

      p.noStroke();
      p.fill(pt.r, pt.g, pt.b, a * 0.08);
      p.circle(pt.x, pt.y, pt.size * 6);

      p.fill(pt.r, pt.g, pt.b, a * 0.25);
      p.circle(pt.x, pt.y, pt.size * 2.8);

      p.fill(pt.r, pt.g, pt.b, a);
      p.circle(pt.x, pt.y, pt.size);
    }

    // Connection sparks: bright arcs between close different-note particles
    drawConnectionSparks(midi.particles, grid);

    // Remove dead particles
    midi.particles = midi.particles.filter(
      pt => pt.life > 0 && pt.y < p.height + 80 && pt.y > -80
    );

    // Draw held-note glow spots at spawn height
    for (const note of midi.activeNotes) {
      const cfg = midi.seenNotes[note];
      if (!cfg) continue;
      const x = noteXFrac(note) * p.width;
      const y = p.height * 0.65;
      const [r, g2, b] = cfg.color;
      p.noStroke();
      for (let radius = 50; radius > 0; radius -= 8) {
        p.fill(r, g2, b, 4);
        p.circle(x, y, radius * 2);
      }
    }

    // ── Bottom UI ──────────────────────────────────────────────────────────
    drawBottomUI(g);

    // ── Hint when nothing has happened yet ────────────────────────────────
    const hasNotes = Object.keys(midi.seenNotes).length > 0;
    const hasCc    = midi.activeCcKey !== null;
    if (!hasNotes && !hasCc) {
      p.noStroke();
      p.fill(55, 55, 80);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(14);
      p.text('click page · press a key · move a slider', p.width / 2, p.height / 2);
    }
  };

  // ── Connection sparks: energy arcs between close different-note particles ──
  function drawConnectionSparks(particles, grid) {
    const SPARK_R = 28;   // px — within this distance a spark is drawn

    for (const pt of particles) {
      const cx = Math.floor(pt.x / CELL);
      const cy = Math.floor(pt.y / CELL);

      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const cell = grid.get(`${cx + dx},${cy + dy}`);
          if (!cell) continue;
          for (const other of cell) {
            // Skip same note and only process each pair once (pt < other by ref)
            if (other === pt || other.note === pt.note || other < pt) continue;

            const nx   = pt.x - other.x;
            const ny   = pt.y - other.y;
            const dist = Math.sqrt(nx * nx + ny * ny);
            if (dist > SPARK_R) continue;

            const t = 1 - dist / SPARK_R;   // 1 = touching, 0 = at edge
            const a = t * 200 * Math.min(pt.life, other.life);

            // Blended midpoint color
            const mr = (pt.r + other.r) / 2;
            const mg = (pt.g + other.g) / 2;
            const mb = (pt.b + other.b) / 2;
            const mx = (pt.x + other.x) / 2;
            const my = (pt.y + other.y) / 2;

            // Arc between the two particles
            p.stroke(mr, mg, mb, a);
            p.strokeWeight(1 + t);
            p.line(pt.x, pt.y, other.x, other.y);

            // Bright flare at midpoint
            p.noStroke();
            p.fill(mr, mg, mb, a * 1.4);
            p.circle(mx, my, 4 * t + 1);
          }
        }
      }
    }
  }

  // ── Bottom UI: note dots (left) + CC gravity meter (right) ────────────────
  function drawBottomUI(g) {
    const barH   = 80;
    const barY   = p.height - barH;
    const divX   = p.width * 0.60;   // divider between notes and CC sections

    // Dark background strip
    p.noStroke();
    p.fill(8, 8, 16, 200);
    p.rect(0, barY, p.width, barH);

    // thin separator line
    p.stroke(20, 20, 32);
    p.strokeWeight(1);
    p.line(0, barY, p.width, barY);
    p.line(divX, barY, divX, p.height);

    drawNoteRow(barY, divX);
    drawCCPanel(divX, barY, g);
  }

  function drawNoteRow(barY, maxX) {
    const sorted = sortedSeenNotes();
    if (sorted.length === 0) return;

    const cy = barY + 28;

    for (let i = 0; i < sorted.length; i++) {
      const note   = sorted[i];
      const cfg    = midi.seenNotes[note];
      const x      = ((i + 1) / (sorted.length + 1)) * maxX;
      const active = midi.activeNotes.has(note);
      const [r, g2, b] = cfg.color;
      const dotR   = active ? 10 : 7;

      // Dot
      p.noStroke();
      if (active) {
        p.fill(r, g2, b, 220);
      } else {
        p.fill(r, g2, b, 55);
      }
      p.circle(x, cy, dotR * 2);

      // Ring when active
      if (active) {
        p.noFill();
        p.stroke(r, g2, b, 120);
        p.strokeWeight(1.5);
        p.circle(x, cy, dotR * 3.5);
      }

      // Note name
      p.noStroke();
      p.fill(r, g2, b, active ? 220 : 80);
      p.textStyle(active ? p.BOLD : p.NORMAL);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(11);
      p.text(noteName(note), x, cy + 20);

      // MIDI number
      p.fill(r, g2, b, active ? 160 : 50);
      p.textStyle(p.NORMAL);
      p.textSize(9);
      p.text(note, x, cy + 32);
    }
  }

  function drawCCPanel(leftX, barY, g) {
    const rightX  = p.width - 12;
    const barW    = rightX - leftX - 100;
    const labelX  = leftX + 12;
    const trackX  = leftX + 90;
    const trackY  = barY + 22;
    const trackH  = 8;

    // No CC received yet
    if (!midi.activeCcKey) {
      p.noStroke();
      p.fill(50, 50, 65);
      p.textAlign(p.LEFT, p.CENTER);
      p.textStyle(p.NORMAL);
      p.textSize(11);
      p.text('move a slider → controls gravity', labelX, barY + 38);
      return;
    }

    const d     = midi.ccData[midi.activeCcKey];
    const norm  = d.value / 127;   // 0–1

    // Section label
    p.noStroke();
    p.fill(80, 80, 100);
    p.textAlign(p.LEFT, p.CENTER);
    p.textStyle(p.NORMAL);
    p.textSize(10);
    p.text('GRAVITY  ↕', labelX, trackY + 4);

    // CC info below
    p.fill(50, 50, 65);
    p.textSize(10);
    p.text(`ch ${d.channel} · ${ccLabel(d.cc)}`, labelX, trackY + trackH + 16);

    // Track background
    p.fill(20, 20, 35);
    p.rect(trackX, trackY, barW, trackH, 2);

    // Filled portion
    p.fill(86, 180, 247);
    p.rect(trackX, trackY, barW * norm, trackH, 2);

    // Gravity direction arrow
    const arrowX = trackX + barW + 8;
    const arrowY = trackY + trackH / 2;
    p.stroke(86, 180, 247, 160);
    p.strokeWeight(1.5);
    if (g < -0.02) {
      // Floating up
      drawArrow(arrowX, arrowY + 6, arrowX, arrowY - 6);
    } else if (g > 0.02) {
      // Falling down
      drawArrow(arrowX, arrowY - 6, arrowX, arrowY + 6);
    } else {
      // Near-weightless
      p.noStroke();
      p.fill(86, 180, 247, 100);
      p.circle(arrowX, arrowY, 5);
    }

    // Current value number
    p.noStroke();
    p.fill(86, 180, 247);
    p.textAlign(p.RIGHT, p.CENTER);
    p.textStyle(p.BOLD);
    p.textSize(18);
    p.text(d.value, trackX + barW + 50, trackY + 4);

    p.fill(50, 50, 70);
    p.textStyle(p.NORMAL);
    p.textSize(10);
    p.text('/ 127', trackX + barW + 50, trackY + 18);
  }

  function drawArrow(x1, y1, x2, y2) {
    p.line(x1, y1, x2, y2);
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const len   = 5;
    p.line(x2, y2,
      x2 - len * Math.cos(angle - 0.5),
      y2 - len * Math.sin(angle - 0.5));
    p.line(x2, y2,
      x2 - len * Math.cos(angle + 0.5),
      y2 - len * Math.sin(angle + 0.5));
  }

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
